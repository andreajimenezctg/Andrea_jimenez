{% extends "base.html" %}
{% load static %}

{% block content %}
<header class="logo">
    <a href="{% url 'home' %}">
        <img src="{% static 'img/logo.png' %}" alt="Andrea Jimenez">
    </a>
</header>

<div class="container">
    <div class="card" style="padding: 40px; border-radius: 15px; margin-top: 20px;">
        <h3>Recuperar Contraseña</h3>
        <p style="text-align: center; color: var(--gris-texto); font-size: 0.9rem; margin-bottom: 25px;">
            Ingresa tu correo registrado y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label for="id_email" style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 500;">Correo Electrónico</label>
                <input type="email" name="email" id="id_email" required 
                       style="width: 100%; padding: 12px; border: 1px solid rgba(232, 180, 184, 0.3); border-radius: 8px; font-family: inherit;"
                       placeholder="tu@email.com">
            </div>
            <button type="submit" 
                    style="width: 100%; padding: 14px; background: var(--negro); color: var(--crema); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: var(--transicion);">
                Enviar Enlace
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 25px;">
            <a href="{% url 'login' %}" style="color: var(--rosado); text-decoration: none; font-size: 0.85rem;">Volver al inicio de sesión</a>
        </div>
    </div>
</div>

<style>
    button:hover {
        background: var(--rosado) !important;
        color: var(--negro) !important;
    }
</style>
{% endblock %}
