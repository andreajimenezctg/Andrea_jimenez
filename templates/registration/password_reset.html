{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 120px auto 60px; padding: 0 20px;">
    <div class="card" style="background: var(--blanco); padding: 40px; border-radius: 20px; box-shadow: var(--sombra-media); border: var(--borde-rosado);">
        <header class="logo" style="text-align: center; margin-bottom: 30px;">
            <a href="{% url 'home' %}">
                <img src="{% static 'img/logo.png' %}" alt="Andrea Jimenez" style="max-height: 60px; width: auto;">
            </a>
        </header>

        <h1 style="font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--negro); text-align: center; margin-bottom: 10px;">Recuperar Contraseña</h1>
        <p style="text-align: center; color: var(--gris-texto); font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5;">
            Ingresa tu correo registrado y te enviaremos un enlace seguro para restablecer tu contraseña.
        </p>

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div style="margin-bottom: 25px;">
                <label for="id_email" style="display: block; margin-bottom: 10px; font-size: 0.9rem; font-weight: 600; color: var(--negro);">Correo Electrónico</label>
                <div style="position: relative;">
                    <i class="fa-regular fa-envelope" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--rosado);"></i>
                    <input type="email" name="email" id="id_email" autocomplete="email" required 
                           style="width: 100%; padding: 14px 14px 14px 45px; border: 1px solid rgba(232, 180, 184, 0.4); border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; background: #fdfaf7; transition: all 0.3s ease;"
                           placeholder="ejemplo@correo.com">
                </div>
            </div>
            <button type="submit" 
                    style="width: 100%; padding: 16px; background: var(--negro); color: var(--crema); border: none; border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.4s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i> Enviar Enlace
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px dashed rgba(232, 180, 184, 0.3);">
            <a href="{% url 'login' %}" style="color: var(--rosado); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.3s;">
                <i class="fa-solid fa-arrow-left" style="margin-right: 5px; font-size: 0.8rem;"></i> Volver al inicio de sesión
            </a>
        </div>
    </div>
</div>

<style>
    .auth-form input:focus {
        outline: none;
        border-color: var(--rosado) !important;
        background: white !important;
        box-shadow: 0 0 0 4px rgba(232, 180, 184, 0.1);
    }
    .auth-form button:hover {
        background: var(--rosado) !important;
        color: var(--negro) !important;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(232, 180, 184, 0.3) !important;
    }
    .auth-form a:hover {
        color: var(--negro) !important;
    }
</style>
{% endblock %}
