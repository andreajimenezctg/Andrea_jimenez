{% extends "base.html" %}
{% load static %}

{% block content %}
<header class="logo">
    <a href="{% url 'home' %}">
        <img src="{% static 'img/logo.png' %}" alt="Andrea Jimenez">
    </a>
</header>

<div class="container">
    <div class="card" style="padding: 40px; border-radius: 15px; margin-top: 20px; text-align: center;">
        <i class="fa-solid fa-circle-check" style="font-size: 3rem; color: #25d366; margin-bottom: 20px;"></i>
        <h3 style="color: var(--negro);">¡Contraseña Actualizada!</h3>
        <p style="color: var(--gris-texto); font-size: 0.9rem; line-height: 1.6; margin-bottom: 25px;">
            Tu contraseña se ha restablecido correctamente. Ya puedes usar tu nueva clave para ingresar a tu cuenta.
        </p>
        
        <a href="{% url 'login' %}" 
           style="display: block; width: 100%; padding: 14px; background: var(--negro); color: var(--crema); border: none; border-radius: 8px; font-weight: 600; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: var(--transicion);">
            Iniciar Sesión
        </a>
    </div>
</div>

<style>
    a:hover {
        background: var(--rosado) !important;
        color: var(--negro) !important;
    }
</style>
{% endblock %}
