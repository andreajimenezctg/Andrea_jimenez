{% load static %}
<link rel="stylesheet" href="{% static 'css/navbar.css' %}">
<header>
    <nav class="navbar">
        <div class="logo">
            <a href="{% url 'home' %}">
                <img src="{% static 'img/logo.png' %}" alt="Andrea Jiménez" class="logo-img">
            </a>
        </div>

        <button class="mobile-menu-btn" aria-label="Abrir menú">
            <i class="fa-solid fa-bars"></i>
        </button>

        <ul class="menu">
            <li><a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}"><i class="fa-solid fa-house"></i> Inicio</a></li>
            <li><a href="{% url 'tienda' %}" class="{% if request.resolver_match.url_name == 'tienda' %}active{% endif %}"><i class="fa-solid fa-store"></i> Tienda</a></li>
            <li><a href="{% url 'oferta' %}" class="{% if request.resolver_match.url_name == 'oferta' %}active{% endif %}"><i class="fa-solid fa-tags"></i> Oferta</a></li>
            <li><a href="{% url 'atencion' %}" class="{% if request.resolver_match.url_name == 'atencion' %}active{% endif %}"><i class="fa-solid fa-headset"></i> Atención al cliente</a></li>
            <li><a href="{% url 'distribuidores' %}" class="{% if request.resolver_match.url_name == 'distribuidores' %}active{% endif %}"><i class="fa-solid fa-location-dot"></i> Ubicación</a></li>
        </ul>

        <div class="user-actions">
            {% if user.is_authenticated and es_cliente %}
                <div class="cart">
                    <a href="{% url 'carrito' %}" aria-label="Bolsa de compras"><i class="fa-solid fa-bag-shopping"></i></a>
                </div>
            {% endif %}

            {% if user.is_authenticated %}
                <div class="dropdown">
                    <button class="dropdown-btn">
                        <i class="fa-regular fa-user"></i> 
                        {% if user.first_name %}{{ user.first_name }}{% else %}{{ user.username }}{% endif %}
                        <i class="fa-solid fa-chevron-down" style="font-size: 0.5rem; margin-left: 5px;"></i>
                    </button>
                    <div class="dropdown-content">
                        <a href="{% url 'panel_cliente' %}"><i class="fa-regular fa-user"></i> Mi Perfil</a>
                        <a href="{% url 'carrito' %}"><i class="fa-solid fa-bag-shopping"></i> Carrito</a>
                        <a href="{% url 'mis_ventas' %}"><i class="fa-solid fa-clock-rotate-left"></i> Mis Compras</a>
                        <div style="border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;"></div>
                        <a href="{% url 'logout' %}" style="color: #ff7a9c;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar Sesión</a>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'login' %}" class="dropdown-btn"><i class="fa-regular fa-user"></i> Iniciar Sesión</a>
            {% endif %}
        </div>
    </nav>
</header>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const menuBtn = document.querySelector('.mobile-menu-btn');
        const menu = document.querySelector('.menu');

        if (menuBtn && menu) {
            menuBtn.addEventListener('click', () => {
                menu.classList.toggle('active');
                const icon = menuBtn.querySelector('i');
                if (menu.classList.contains('active')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-xmark');
                } else {
                    icon.classList.remove('fa-xmark');
                    icon.classList.add('fa-bars');
                }
            });

            // Cerrar menú al hacer click fuera
            document.addEventListener('click', (e) => {
                if (menu.classList.contains('active') && !menu.contains(e.target) && !menuBtn.contains(e.target)) {
                    menu.classList.remove('active');
                    const icon = menuBtn.querySelector('i');
                    icon.classList.remove('fa-xmark');
                    icon.classList.add('fa-bars');
                }
            });
        }
    });
</script>
