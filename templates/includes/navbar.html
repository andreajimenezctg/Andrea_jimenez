{% load static %}
<header>
    <nav class="navbar">
        <div class="logo">
            <a href="{% url 'home' %}">
                <img src="{% static 'img/logo.png' %}" alt="Andrea Jiménez" class="logo-img">
            </a>
        </div>

        <ul class="menu">
            <li><a href="{% url 'home' %}" class="{% if request.path == '/' %}active{% endif %}">Inicio</a></li>
            <li><a href="{% url 'tienda' %}" class="{% if 'tienda' in request.path %}active{% endif %}">Tienda</a></li>
            <li><a href="{% url 'oferta' %}" class="{% if 'oferta' in request.path %}active{% endif %}">Oferta</a></li>
            <li><a href="{% url 'atencion' %}" class="{% if 'atencion' in request.path %}active{% endif %}">Atención</a></li>
            <li><a href="{% url 'distribuidores' %}" class="{% if 'distribuidores' in request.path %}active{% endif %}">Ubicación</a></li>
        </ul>

        <div class="user-actions">
            {% if user.is_authenticated %}
                <span class="user-name">{% if user.first_name %}{{ user.first_name }}{% else %}{{ user.username }}{% endif %}</span>
                
                {% if user.groups.first.name == "Cliente" %}
                <div class="cart">
                    <a href="{% url 'carrito' %}" aria-label="Bolsa de compras">
                        <i class="fa-solid fa-bag-shopping"></i>
                    </a>
                </div>
                {% endif %}

                <a href="{% url 'logout' %}" class="btn-logout">Salir</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn-logout">Entrar</a>
            {% endif %}
        </div>
    </nav>
</header>
