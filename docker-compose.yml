version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=andrea_jimenez
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=riki123
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key
      - DATABASE_URL=postgres://postgres:riki123@db:5432/andrea_jimenez
    depends_on:
      - db

volumes:
  postgres_data:
